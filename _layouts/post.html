---
layout: default
---

<article class="markdown-body">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">
        <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %d, %Y" }}</time>
    </p>
    <div class="markdown-content">
        {{ content }}
    </div>
</article>
